name: ecosmart-four-buttons-held
components:
  - id: main
    capabilities:
      - id: battery
        version: 1
      - id: firmwareUpdate
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: RemoteController

  - id: button1
    capabilities:
      - id: button
        version: 1
        config:
          values:
            - key: "button.supportedButtonValues"
              value:
                - pushed
    categories:
      - name: RemoteController

  - id: button2
    capabilities:
      - id: button
        version: 1
        config:
          values:
            - key: "button.supportedButtonValues"
              value:
                - pushed
                - held
    categories:
      - name: RemoteController

  - id: button3
    capabilities:
      - id: button
        version: 1
        config:
          values:
            - key: "button.supportedButtonValues"
              value:
                - pushed
                - held
    categories:
      - name: RemoteController

  - id: button4
    capabilities:
      - id: button
        version: 1
        config:
          values:
            - key: "button.supportedButtonValues"
              value:
                - pushed
    categories:
      - name: RemoteController
